name: generar y publicar javadoc

on:
  push:
    branches:
      - stable  # el robot solo trabaja cuando algo llega a stable

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: descargar código
        uses: actions/checkout@v4

      - name: configurar java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: generar javadoc
        run: |
          javadoc -d docs -encoding utf-8 -sourcepath src/main/java -subpackages com.tt1.test

      - name: subir a github pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/' # subimos la carpeta que generamos

      - name: desplegar web
        uses: actions/deploy-pages@v4